name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Ruff lint
        run: ruff check code/

      - name: Ruff format check
        run: ruff format --check code/

      - name: Compile all modules
        run: |
          python -m compileall -q code/

      - name: Run unit tests (exclude E2E/Playwright)
        run: |
          pytest code/tests/ -v \
            --ignore=code/tests/e2e \
            --ignore=code/tests/playwright \
            -k "not e2e and not playwright"
